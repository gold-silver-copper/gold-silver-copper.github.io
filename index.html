    <!-- Hidden input for mobile virtual keyboard (REPL) -->
    <input id="repl-keyboard-input" type="text"
      style="position:fixed;opacity:0;width:1px;height:1px;top:-9999px;left:-9999px;pointer-events:none;"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      inputmode="text" enterkeyhint="send" />

    <script>
      // Mobile interaction support: swipe gestures, mousewheel, momentum scrolling, zone-aware scrolling
      (function() {
        var touchStartX = 0;
        var touchStartY = 0;
        var touchLastY = 0;
        var touchLastX = 0;
        var touchLastTime = 0;
        var velocityY = 0;
        var minSwipeDistance = 40;
        var touchScrollThreshold = 20;
        var momentumId = null;
        // Zone detection: track touch start position relative to screen
        var touchZone = 'content'; // 'tabs' or 'content'
        var tabZoneThreshold = 0.12; // top 12% of screen is tab zone
        // (replInputZoneThreshold removed — input is now at top)

        // Prevent context menu on long press for native feel
        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
        });

        // Helper: get the ratzilla canvas element (lazily cached)
        var _canvas = null;
        function getCanvas() {
          if (!_canvas) {
            _canvas = document.querySelector('canvas') || document.querySelector('.ratzilla');
          }
          return _canvas;
        }

        // Helper: dispatch a key event to the canvas (where ratzilla listens)
        function dispatchKey(key) {
          var c = getCanvas();
          if (c) {
            c.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
          }
        }

        // Helper: detect if touch is in the tab bar zone (top portion of screen)
        function getTouchZone(clientY) {
          var winH = window.innerHeight || document.documentElement.clientHeight || 600;
          return (clientY / winH) < tabZoneThreshold ? 'tabs' : 'content';
        }

        document.addEventListener('touchstart', function(e) {
          touchStartX = e.changedTouches[0].screenX;
          touchStartY = e.changedTouches[0].screenY;
          touchLastY = touchStartY;
          touchLastX = touchStartX;
          touchLastTime = Date.now();
          velocityY = 0;
          // Determine which zone the touch started in
          touchZone = getTouchZone(e.changedTouches[0].clientY);
          // Cancel any running momentum scroll
          if (momentumId) {
            clearTimeout(momentumId);
            momentumId = null;
          }
        }, { passive: true });

        // Continuous scroll during touch-move with velocity tracking and zone awareness
        document.addEventListener('touchmove', function(e) {
          var currentY = e.changedTouches[0].screenY;
          var currentX = e.changedTouches[0].screenX;
          var now = Date.now();
          var dt = now - touchLastTime;
          var deltaY = currentY - touchLastY;
          var deltaX = currentX - touchLastX;

          if (dt > 0) {
            velocityY = deltaY / dt;
          }

          if (touchZone === 'tabs') {
            // In tab zone: horizontal movement scrolls tabs
            if (Math.abs(deltaX) > touchScrollThreshold) {
              dispatchKey(deltaX > 0 ? 'ArrowLeft' : 'ArrowRight');
              touchLastX = currentX;
              touchLastTime = now;
            }
          } else {
            // In content zone: vertical movement scrolls content
            if (Math.abs(deltaY) > touchScrollThreshold) {
              dispatchKey(deltaY > 0 ? 'ArrowUp' : 'ArrowDown');
              touchLastY = currentY;
              touchLastTime = now;
            }
          }
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
          var dx = e.changedTouches[0].screenX - touchStartX;
          var dy = e.changedTouches[0].screenY - touchStartY;

          if (touchZone === 'tabs') {
            // Tab zone: horizontal swipes scroll tabs (already handled in touchmove)
            // No momentum for tab scrolling
            return;
          }

          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipeDistance) {
            // Horizontal swipe in content zone — dispatch arrow key for navigation
            dispatchKey(dx > 0 ? 'ArrowLeft' : 'ArrowRight');
          } else if (Math.abs(velocityY) > 0.3) {
            // Momentum scrolling — continue scrolling with deceleration
            var v = velocityY;
            var friction = 0.92;
            var throttledStep = function() {
              v *= friction;
              if (Math.abs(v) < 0.05) {
                momentumId = null;
                return;
              }
              dispatchKey(v > 0 ? 'ArrowUp' : 'ArrowDown');
              momentumId = setTimeout(throttledStep, 66);
            };
            throttledStep();
          }
        }, { passive: true });

        // Handle touch cancel (e.g. notification interrupts)
        document.addEventListener('touchcancel', function() {
          velocityY = 0;
          if (momentumId) {
            clearTimeout(momentumId);
            momentumId = null;
          }
        }, { passive: true });

        // Mousewheel support — scroll content with wheel
        document.addEventListener('wheel', function(e) {
          var c = getCanvas();
          if (c && (c.contains(e.target) || e.target === c)) {
            dispatchKey(e.deltaY > 0 ? 'ArrowDown' : 'ArrowUp');
            e.preventDefault();
          }
        }, { passive: false });

        // Prevent double-tap zoom on iOS
        var lastTap = 0;
        document.addEventListener('touchend', function(e) {
          var now = Date.now();
          if (now - lastTap < 300) {
            e.preventDefault();
          }
          lastTap = now;
        }, { passive: false });

        // Dynamic window resize: force canvas to recalculate on resize/orientation change
        function handleResize() {
          _canvas = null; // reset cached canvas in case it was recreated
          var c = getCanvas();
          if (c) {
            var w = window.innerWidth;
            var h = window.innerHeight;
            c.style.width = w + 'px';
            c.style.height = h + 'px';
            // Update canvas internal resolution to match display size
            var dpr = window.devicePixelRatio || 1;
            c.width = Math.round(w * dpr);
            c.height = Math.round(h * dpr);
          }
          document.body.style.width = window.innerWidth + 'px';
          document.body.style.height = window.innerHeight + 'px';
        }
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', function() {
          // Delay to let the browser settle after orientation change
          setTimeout(handleResize, 100);
          setTimeout(handleResize, 300);
          setTimeout(handleResize, 600);
        });

        // Visual viewport API: handle virtual keyboard appearance
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', function() {
            var vv = window.visualViewport;
            _canvas = null;
            var c = getCanvas();
            if (c) {
              c.style.height = vv.height + 'px';
              c.style.width = vv.width + 'px';
              var dpr = window.devicePixelRatio || 1;
              c.width = Math.round(vv.width * dpr);
              c.height = Math.round(vv.height * dpr);
            }
            document.body.style.height = vv.height + 'px';
            document.body.style.width = vv.width + 'px';
          });
          window.visualViewport.addEventListener('scroll', function() {
            var vv = window.visualViewport;
            document.body.style.transform = 'translateY(' + (-vv.offsetTop) + 'px)';
          });
        }

        // REPL virtual keyboard support: focus hidden input on tap to open keyboard
        // Expose a global function that Rust can call to focus/blur the hidden input
        var replInput = null;
        var replInputInitialized = false;
        function initReplInput() {
          if (replInputInitialized) return;
          replInput = document.getElementById('repl-keyboard-input');
          if (!replInput) return;
          replInputInitialized = true;
          // Forward input events as key events to canvas
          replInput.addEventListener('input', function(e) {
            var data = e.data;
            if (data) {
              for (var i = 0; i < data.length; i++) {
                dispatchKey(data[i]);
              }
            } else if (e.inputType === 'deleteContentBackward') {
              dispatchKey('Backspace');
            }
            replInput.value = '';
          });
          // Handle composition events (swipe typing, predictive text)
          replInput.addEventListener('compositionend', function(e) {
            var data = e.data;
            if (data) {
              for (var i = 0; i < data.length; i++) {
                dispatchKey(data[i]);
              }
            }
            replInput.value = '';
          });
          replInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === 'Backspace') {
              dispatchKey(e.key);
              e.preventDefault();
            }
          });
        }
        window._focusReplInput = function() {
          initReplInput();
          if (replInput) {
            replInput.style.top = '0';
            replInput.style.left = '0';
            replInput.style.width = '70%';
            replInput.style.height = '40px';
            replInput.style.opacity = '0';
            replInput.style.pointerEvents = 'auto';
            replInput.focus();
          }
        };
        window._blurReplInput = function() {
          initReplInput();
          if (replInput) {
            replInput.blur();
            replInput.style.top = '-9999px';
            replInput.style.left = '-9999px';
            replInput.style.width = '1px';
            replInput.style.height = '1px';
            replInput.style.pointerEvents = 'none';
          }
        };

        // Tap-to-focus: when user taps while on REPL,
        // focus the hidden input to bring up virtual keyboard
        // Only focus when tapping below the tab zone (prevents keyboard
        // from blocking tab switching in horizontal mobile mode)
        document.addEventListener('click', function(e) {
            if (window._replTabActive) {
              var zone = getTouchZone(e.clientY);
              if (zone !== 'tabs') {
                window._focusReplInput();
              }
            }
        });
        window._replTabActive = false;

        // Paste support: handle Ctrl+V / Cmd+V by forwarding pasted text to the canvas
        document.addEventListener('paste', function(e) {
          if (window._replTabActive) {
            e.preventDefault();
            var text = (e.clipboardData || window.clipboardData).getData('text');
            if (text) {
              // Strip newlines and normalize whitespace — REPL is single-line input
              text = text.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();
              for (var i = 0; i < text.length; i++) {
                dispatchKey(text[i]);
              }
            }
          }
        });
      })();
    </script>
