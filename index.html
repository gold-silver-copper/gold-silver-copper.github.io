  <body>
    <!-- Hidden input for mobile virtual keyboard (REPL) -->
    <input id="repl-keyboard-input" type="text"
      style="position:fixed;opacity:0;width:1px;height:1px;top:-9999px;left:-9999px;pointer-events:none;"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      inputmode="text" enterkeyhint="send" />

    <script>
      // ═══════════════════════════════════════════════════════════════════
      // GriftApp — Unified interaction layer for the Grift WASM terminal
      // ═══════════════════════════════════════════════════════════════════
      //
      // Architecture:
      //   Canvas  ← single source of truth for all input dispatch
      //   Gesture ← state machine distinguishing taps from swipes
      //   Zones   ← top 12% = tab bar, rest = content
      //   REPL    ← virtual keyboard bridge for mobile text input
      //   Viewport← resize / orientation / visual-viewport handling
      //
      // All interaction flows through GriftApp.dispatch(key) which sends
      // a KeyboardEvent to the ratzilla canvas. Mouse events are only
      // forwarded for hover tracking and confirmed taps (never during
      // swipes), preventing phantom clicks on mobile.
      // ═══════════════════════════════════════════════════════════════════

      // Disable WebGL2 anti-aliasing before ratzilla creates its context
      (function() {
        var orig = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type, attrs) {
          if (type === 'webgl2' || type === 'webgl') {
            attrs = Object.assign({}, attrs || {});
            attrs.antialias = false;
          }
          return orig.call(this, type, attrs);
        };
      })();

      // Prevent context menu on long press for native feel
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      var GriftApp = (function() {

        // ── Configuration ──────────────────────────────────────────────
        var CFG = {
          TAB_ZONE_FRACTION:   0.12,   // top 12% of screen is tab bar
          SWIPE_THRESHOLD:     12,     // px movement to become a swipe
          SCROLL_STEP:         20,     // px delta to emit one scroll key
          MIN_SWIPE_DISTANCE:  40,     // px for content horizontal swipe
          MOMENTUM_FRICTION:   0.92,
          MOMENTUM_MIN_V:      0.05,
          MOMENTUM_INTERVAL:   66,     // ms between momentum steps
          MOMENTUM_THRESHOLD:  0.3,    // min velocity to trigger momentum
          DOUBLE_TAP_MS:       300,
        };

        // ── Canvas accessor (lazily cached, reset on resize) ───────────
        var _canvas = null;
        function canvas() {
          if (!_canvas) _canvas = document.querySelector('canvas') || document.querySelector('.ratzilla');
          return _canvas;
        }
        function resetCanvas() { _canvas = null; }

        // ── Dispatch helpers ───────────────────────────────────────────
        function dispatch(key) {
          var c = canvas();
          if (c) c.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        }

        function emitMouse(type, clientX, clientY) {
          var c = canvas();
          if (!c) return;
          c.dispatchEvent(new MouseEvent(type, {
            clientX: clientX, clientY: clientY,
            button: 0, buttons: type === 'mouseup' ? 0 : 1,
            bubbles: true, cancelable: true,
          }));
        }

        // ── Zone detection ─────────────────────────────────────────────
        function zone(clientY) {
          var h = window.innerHeight || document.documentElement.clientHeight || 600;
          return (clientY / h) < CFG.TAB_ZONE_FRACTION ? 'tabs' : 'content';
        }

        // ── Gesture state machine ──────────────────────────────────────
        // States: IDLE → TOUCHING → SWIPING
        // TOUCHING: finger is down, hasn't moved past threshold
        // SWIPING:  finger moved past threshold — suppress click on end
        var gesture = {
          state:      'IDLE',
          zone:       'content',
          startX:     0,  startY:     0,
          lastX:      0,  lastY:      0,
          lastTime:   0,
          velocityY:  0,
          momentumId: null,

          begin: function(touch) {
            this.state    = 'TOUCHING';
            this.zone     = zone(touch.clientY);
            this.startX   = touch.screenX;
            this.startY   = touch.screenY;
            this.lastX    = touch.screenX;
            this.lastY    = touch.screenY;
            this.lastTime = Date.now();
            this.velocityY = 0;
            this.cancelMomentum();
            // Forward mousemove for hover tracking (not mousedown — that waits for tap confirm)
            emitMouse('mousemove', touch.clientX, touch.clientY);
          },

          move: function(touch) {
            var sx = touch.screenX, sy = touch.screenY;
            var now = Date.now();
            var dt  = now - this.lastTime;
            var dx  = sx - this.lastX;
            var dy  = sy - this.lastY;

            // Promote to SWIPING once movement exceeds threshold
            if (this.state === 'TOUCHING') {
              var totalDx = sx - this.startX;
              var totalDy = sy - this.startY;
              if (Math.abs(totalDx) > CFG.SWIPE_THRESHOLD || Math.abs(totalDy) > CFG.SWIPE_THRESHOLD) {
                this.state = 'SWIPING';
              }
            }

            if (dt > 0) this.velocityY = dy / dt;

            // Forward mousemove for hover tracking
            emitMouse('mousemove', touch.clientX, touch.clientY);

            if (this.zone === 'tabs') {
              // Horizontal movement scrolls tabs
              if (Math.abs(dx) > CFG.SCROLL_STEP) {
                dispatch(dx > 0 ? 'ArrowLeft' : 'ArrowRight');
                this.lastX = sx;
                this.lastTime = now;
              }
            } else {
              // Vertical movement scrolls content
              if (Math.abs(dy) > CFG.SCROLL_STEP) {
                dispatch(dy > 0 ? 'ArrowUp' : 'ArrowDown');
                this.lastY = sy;
                this.lastTime = now;
              }
            }
          },

          end: function(touch) {
            var wasTap = (this.state === 'TOUCHING');

            if (wasTap) {
              // Confirmed tap — forward as mousedown + mouseup (click)
              emitMouse('mousedown', touch.clientX, touch.clientY);
              emitMouse('mouseup',   touch.clientX, touch.clientY);
            } else if (this.zone === 'content') {
              // Swipe in content zone
              var dx = touch.screenX - this.startX;
              var dy = touch.screenY - this.startY;
              if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > CFG.MIN_SWIPE_DISTANCE) {
                dispatch(dx > 0 ? 'ArrowLeft' : 'ArrowRight');
              } else if (Math.abs(this.velocityY) > CFG.MOMENTUM_THRESHOLD) {
                this.startMomentum();
              }
            }
            // Tab zone swipes: already handled in move(), no momentum needed.

            this.state = 'IDLE';
          },

          cancel: function() {
            this.state = 'IDLE';
            this.velocityY = 0;
            this.cancelMomentum();
          },

          startMomentum: function() {
            var self = this;
            var v = this.velocityY;
            var step = function() {
              v *= CFG.MOMENTUM_FRICTION;
              if (Math.abs(v) < CFG.MOMENTUM_MIN_V) { self.momentumId = null; return; }
              dispatch(v > 0 ? 'ArrowUp' : 'ArrowDown');
              self.momentumId = setTimeout(step, CFG.MOMENTUM_INTERVAL);
            };
            step();
          },

          cancelMomentum: function() {
            if (this.momentumId) { clearTimeout(this.momentumId); this.momentumId = null; }
          },
        };

        // ── Touch event wiring ─────────────────────────────────────────
        document.addEventListener('touchstart', function(e) {
          gesture.begin(e.changedTouches[0]);
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
          gesture.move(e.changedTouches[0]);
        }, { passive: true });

        // Touchend: confirm tap or finalize swipe (passive: false to prevent double-tap zoom)
        var lastTapTime = 0;
        document.addEventListener('touchend', function(e) {
          gesture.end(e.changedTouches[0]);
          // Prevent double-tap zoom on iOS
          var now = Date.now();
          if (now - lastTapTime < CFG.DOUBLE_TAP_MS) e.preventDefault();
          lastTapTime = now;
        }, { passive: false });

        document.addEventListener('touchcancel', function() {
          gesture.cancel();
        }, { passive: true });

        // ── Mouse wheel ────────────────────────────────────────────────
        document.addEventListener('wheel', function(e) {
          var c = canvas();
          if (c && (c.contains(e.target) || e.target === c)) {
            dispatch(e.deltaY > 0 ? 'ArrowDown' : 'ArrowUp');
            e.preventDefault();
          }
        }, { passive: false });

        // ── Viewport / resize handling ─────────────────────────────────
        function viewportSize() {
          if (window.visualViewport) return { w: window.visualViewport.width, h: window.visualViewport.height };
          return { w: window.innerWidth, h: window.innerHeight };
        }

        function handleResize() {
          resetCanvas();
          var c = canvas();
          var s = viewportSize();
          if (c) {
            c.style.width  = s.w + 'px';
            c.style.height = s.h + 'px';
            var dpr = window.devicePixelRatio || 1;
            c.width  = Math.round(s.w * dpr);
            c.height = Math.round(s.h * dpr);
          }
          document.body.style.width  = s.w + 'px';
          document.body.style.height = s.h + 'px';
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', function() {
          setTimeout(handleResize, 100);
          setTimeout(handleResize, 300);
          setTimeout(handleResize, 600);
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', handleResize);
          window.visualViewport.addEventListener('scroll', function() {
            document.body.style.transform = 'translateY(' + (-window.visualViewport.offsetTop) + 'px)';
          });
        }

        // ── REPL virtual keyboard bridge ───────────────────────────────
        var replInput = null;
        var replReady = false;

        function initRepl() {
          if (replReady) return;
          replInput = document.getElementById('repl-keyboard-input');
          if (!replInput) return;
          replReady = true;

          replInput.addEventListener('input', function(e) {
            if (e.data) {
              for (var i = 0; i < e.data.length; i++) dispatch(e.data[i]);
            } else if (e.inputType === 'deleteContentBackward') {
              dispatch('Backspace');
            }
            replInput.value = '';
          });

          replInput.addEventListener('compositionend', function(e) {
            if (e.data) {
              for (var i = 0; i < e.data.length; i++) dispatch(e.data[i]);
            }
            replInput.value = '';
          });

          replInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === 'Backspace') {
              dispatch(e.key);
              e.preventDefault();
            }
          });
        }

        window._replTabActive = false;

        window._focusReplInput = function() {
          initRepl();
          if (!replInput) return;
          replInput.style.top = '0';
          replInput.style.left = '0';
          replInput.style.width = '70%';
          replInput.style.height = '40px';
          replInput.style.opacity = '0';
          replInput.style.pointerEvents = 'auto';
          replInput.focus();
        };

        window._blurReplInput = function() {
          initRepl();
          if (!replInput) return;
          replInput.blur();
          replInput.style.top = '-9999px';
          replInput.style.left = '-9999px';
          replInput.style.width = '1px';
          replInput.style.height = '1px';
          replInput.style.pointerEvents = 'none';
        };

        // Tap-to-focus REPL input (only in content zone)
        document.addEventListener('click', function(e) {
          if (window._replTabActive) {
            if (zone(e.clientY) !== 'tabs') window._focusReplInput();
            else window._blurReplInput();
          }
        });

        // Paste support
        document.addEventListener('paste', function(e) {
          if (!window._replTabActive) return;
          e.preventDefault();
          var text = (e.clipboardData || window.clipboardData).getData('text');
          if (text) {
            text = text.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();
            for (var i = 0; i < text.length; i++) dispatch(text[i]);
          }
        });

        // ── Public API (for debugging / future extensibility) ──────────
        return { dispatch: dispatch, canvas: canvas, zone: zone, gesture: gesture, CFG: CFG };
      })();
    </script>

</script></body>
