<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/firacode/6.2.0/fira_code.min.css"
    />
    <title>GRIFT.RS – Personal Website & Grift Demo</title>
    <link data-trunk rel="css" href="assets/style.css" />
  </head>
  <body>
    <script>
      // Mobile interaction support: swipe gestures, mousewheel, continuous touch-scroll
      (function() {
        var touchStartX = 0;
        var touchStartY = 0;
        var touchLastY = 0;
        var minSwipeDistance = 50;
        var touchScrollThreshold = 30;

        document.addEventListener('touchstart', function(e) {
          touchStartX = e.changedTouches[0].screenX;
          touchStartY = e.changedTouches[0].screenY;
          touchLastY = touchStartY;
        }, { passive: true });

        // Continuous vertical scroll during touch-move
        document.addEventListener('touchmove', function(e) {
          var currentY = e.changedTouches[0].screenY;
          var deltaY = currentY - touchLastY;
          if (Math.abs(deltaY) > touchScrollThreshold) {
            var key = deltaY > 0 ? 'ArrowUp' : 'ArrowDown';
            document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
            touchLastY = currentY;
          }
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
          var dx = e.changedTouches[0].screenX - touchStartX;
          var dy = e.changedTouches[0].screenY - touchStartY;

          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipeDistance) {
            // Horizontal swipe — dispatch arrow key for tab/page navigation
            var key = dx > 0 ? 'ArrowLeft' : 'ArrowRight';
            document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
          }
        }, { passive: true });

        // Mousewheel support — scroll content with wheel
        document.addEventListener('wheel', function(e) {
          var key = e.deltaY > 0 ? 'ArrowDown' : 'ArrowUp';
          document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
          e.preventDefault();
        }, { passive: false });
      })();
    </script>
  </body>
</html>
