<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#08090e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.json" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-dir" href="../fonts" />
    <link data-trunk rel="copy-file" href="../icon-192.png" />
    <link data-trunk rel="copy-file" href="../icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./fonts/firacode.css" />
    <title>GRIFT.RS – Personal Website & Grift Demo</title>
    <link data-trunk rel="css" href="assets/style.css" />
  </head>
  <body>

    <script>
      // ═══════════════════════════════════════════════════════════════════
      // GriftApp — Unified interaction layer for the Grift WASM terminal
      // ═══════════════════════════════════════════════════════════════════
      //
      // Architecture:
      //   Canvas  ← single source of truth for all input dispatch
      //   Gesture ← state machine distinguishing taps from swipes
      //   Zones   ← top 12% = tab bar, rest = content
      //   Viewport← resize / orientation / visual-viewport handling
      //
      // All interaction flows through GriftApp.dispatch(key) which sends
      // a KeyboardEvent to the ratzilla canvas. Mouse events are only
      // forwarded for hover tracking and confirmed taps (never during
      // swipes), preventing phantom clicks on mobile.
      // ═══════════════════════════════════════════════════════════════════

      // Prevent context menu on long press for native feel
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      var GriftApp = (function() {

        // ── Configuration ──────────────────────────────────────────────
        var CFG = {
          TAB_ZONE_FRACTION:   0.12,   // top 12% of screen is tab bar
          SWIPE_THRESHOLD:     12,     // px movement to become a swipe
          SCROLL_STEP:         20,     // px delta to emit one scroll key
          MIN_SWIPE_DISTANCE:  40,     // px for content horizontal swipe
          MOMENTUM_FRICTION:   0.92,
          MOMENTUM_MIN_V:      0.05,
          MOMENTUM_INTERVAL:   66,     // ms between momentum steps
          MOMENTUM_THRESHOLD:  0.3,    // min velocity to trigger momentum
          DOUBLE_TAP_MS:       300,
        };

        // ── Canvas accessor (lazily cached, reset on resize) ───────────
        var _canvas = null;
        function canvas() {
          if (!_canvas) _canvas = document.querySelector('canvas') || document.querySelector('.ratzilla');
          return _canvas;
        }
        function resetCanvas() { _canvas = null; }

        // ── Dispatch helpers ───────────────────────────────────────────
        function dispatch(key) {
          var c = canvas();
          if (c) c.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        }

        function emitMouse(type, clientX, clientY) {
          var c = canvas();
          if (!c) return;
          c.dispatchEvent(new MouseEvent(type, {
            clientX: clientX, clientY: clientY,
            button: 0, buttons: type === 'mouseup' ? 0 : 1,
            bubbles: true, cancelable: true,
          }));
        }

        // ── Zone detection ─────────────────────────────────────────────
        function zone(clientY) {
          var h = window.innerHeight || document.documentElement.clientHeight || 600;
          return (clientY / h) < CFG.TAB_ZONE_FRACTION ? 'tabs' : 'content';
        }

        // ── Gesture state machine ──────────────────────────────────────
        var gesture = {
          state:      'IDLE',
          zone:       'content',
          startX:     0,  startY:     0,
          lastX:      0,  lastY:      0,
          lastTime:   0,
          velocityY:  0,
          momentumId: null,
          lastTapTime:   0,
          lastTapX:      0,
          lastTapY:      0,
          isDoubleTap:   false,

          begin: function(touch) {
            var now = Date.now();
            var dt  = now - this.lastTapTime;
            var tapDx = Math.abs(touch.screenX - this.lastTapX);
            var tapDy = Math.abs(touch.screenY - this.lastTapY);
            this.isDoubleTap = (dt < CFG.DOUBLE_TAP_MS && tapDx < 30 && tapDy < 30);

            this.state    = 'TOUCHING';
            this.zone     = zone(touch.clientY);
            this.startX   = touch.screenX;
            this.startY   = touch.screenY;
            this.lastX    = touch.screenX;
            this.lastY    = touch.screenY;
            this.lastTime = now;
            this.velocityY = 0;
            this.cancelMomentum();

            if (this.isDoubleTap) {
              emitMouse('mousedown', touch.clientX, touch.clientY);
            } else {
              emitMouse('mousemove', touch.clientX, touch.clientY);
            }
          },

          move: function(touch) {
            var sx = touch.screenX, sy = touch.screenY;
            var now = Date.now();
            var dt  = now - this.lastTime;
            var dx  = sx - this.lastX;
            var dy  = sy - this.lastY;

            if (this.state === 'TOUCHING') {
              var totalDx = sx - this.startX;
              var totalDy = sy - this.startY;
              if (Math.abs(totalDx) > CFG.SWIPE_THRESHOLD || Math.abs(totalDy) > CFG.SWIPE_THRESHOLD) {
                this.state = this.isDoubleTap ? 'DOUBLE_TAP_DRAGGING' : 'SWIPING';
              }
            }

            if (dt > 0) this.velocityY = dy / dt;

            if (this.state === 'DOUBLE_TAP_DRAGGING') {
              emitMouse('mousemove', touch.clientX, touch.clientY);
            } else {
              emitMouse('mousemove', touch.clientX, touch.clientY);

              if (this.zone === 'tabs') {
                if (Math.abs(dx) > CFG.SCROLL_STEP) {
                  dispatch(dx > 0 ? 'ArrowLeft' : 'ArrowRight');
                  this.lastX = sx;
                  this.lastTime = now;
                }
              } else {
                if (Math.abs(dy) > CFG.SCROLL_STEP) {
                  dispatch(dy > 0 ? 'ArrowUp' : 'ArrowDown');
                  this.lastY = sy;
                  this.lastTime = now;
                }
              }
            }
          },

          end: function(touch) {
            var wasTap = (this.state === 'TOUCHING');

            if (this.state === 'DOUBLE_TAP_DRAGGING') {
              emitMouse('mouseup', touch.clientX, touch.clientY);
            } else if (wasTap && this.isDoubleTap) {
              emitMouse('mouseup', touch.clientX, touch.clientY);
            } else if (wasTap) {
              emitMouse('mousedown', touch.clientX, touch.clientY);
              emitMouse('mouseup',   touch.clientX, touch.clientY);
            } else if (this.zone === 'content') {
              var dx = touch.screenX - this.startX;
              var dy = touch.screenY - this.startY;
              if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > CFG.MIN_SWIPE_DISTANCE) {
                dispatch(dx > 0 ? 'ArrowLeft' : 'ArrowRight');
              } else if (Math.abs(this.velocityY) > CFG.MOMENTUM_THRESHOLD) {
                this.startMomentum();
              }
            }

            if (wasTap) {
              this.lastTapTime = Date.now();
              this.lastTapX    = touch.screenX;
              this.lastTapY    = touch.screenY;
            }

            this.state = 'IDLE';
            this.isDoubleTap = false;
          },

          cancel: function() {
            if (this.state === 'DOUBLE_TAP_DRAGGING' || (this.state === 'TOUCHING' && this.isDoubleTap)) {
              emitMouse('mouseup', this.lastX, this.lastY);
            }
            this.state = 'IDLE';
            this.isDoubleTap = false;
            this.velocityY = 0;
            this.cancelMomentum();
          },

          startMomentum: function() {
            var self = this;
            var v = this.velocityY;
            var step = function() {
              v *= CFG.MOMENTUM_FRICTION;
              if (Math.abs(v) < CFG.MOMENTUM_MIN_V) { self.momentumId = null; return; }
              dispatch(v > 0 ? 'ArrowUp' : 'ArrowDown');
              self.momentumId = setTimeout(step, CFG.MOMENTUM_INTERVAL);
            };
            step();
          },

          cancelMomentum: function() {
            if (this.momentumId) { clearTimeout(this.momentumId); this.momentumId = null; }
          },
        };

        // ── Touch event wiring ─────────────────────────────────────────
        document.addEventListener('touchstart', function(e) {
          gesture.begin(e.changedTouches[0]);
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
          gesture.move(e.changedTouches[0]);
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
          gesture.end(e.changedTouches[0]);
          var now = Date.now();
          if (now - gesture.lastTapTime < CFG.DOUBLE_TAP_MS) e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchcancel', function() {
          gesture.cancel();
        }, { passive: true });

        // ── Mouse wheel ────────────────────────────────────────────────
        document.addEventListener('wheel', function(e) {
          var c = canvas();
          if (c && (c.contains(e.target) || e.target === c)) {
            dispatch(e.deltaY > 0 ? 'ArrowDown' : 'ArrowUp');
            e.preventDefault();
          }
        }, { passive: false });

        // ── Viewport / resize handling ─────────────────────────────────
        // Use ResizeObserver on the canvas for reliable sizing that
        // correctly handles orientation changes without stale dimensions.
        var _resizeObserver = null;

        function updateBackingStore(c) {
          var rect = c.getBoundingClientRect();
          var dpr = window.devicePixelRatio || 1;
          var newW = Math.round(rect.width * dpr);
          var newH = Math.round(rect.height * dpr);
          if (c.width !== newW || c.height !== newH) {
            c.width  = newW;
            c.height = newH;
          }
        }

        function setupResizeObserver() {
          var c = canvas();
          if (!c || _resizeObserver) return;
          _resizeObserver = new ResizeObserver(function() {
            updateBackingStore(c);
          });
          _resizeObserver.observe(c);
          updateBackingStore(c);
        }

        // Fallback: also listen for resize events
        window.addEventListener('resize', function() {
          resetCanvas();
          var c = canvas();
          if (c) updateBackingStore(c);
        });

        // Set up observer once the canvas exists
        if (document.readyState === 'complete') {
          setupResizeObserver();
        } else {
          window.addEventListener('load', setupResizeObserver);
        }
        // Also try on a short delay in case canvas is created by WASM
        setTimeout(setupResizeObserver, 100);
        setTimeout(setupResizeObserver, 500);

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', function() {
            resetCanvas();
            var c = canvas();
            if (c) updateBackingStore(c);
          });
          window.visualViewport.addEventListener('scroll', function() {
            document.body.style.transform = 'translateY(' + (-window.visualViewport.offsetTop) + 'px)';
          });
        }

        // ── Paste support (dispatches pasted text as key events) ───────
        document.addEventListener('paste', function(e) {
          e.preventDefault();
          var text = (e.clipboardData || window.clipboardData).getData('text');
          if (text) {
            text = text.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();
            for (var i = 0; i < text.length; i++) dispatch(text[i]);
          }
        });

        // ── Public API ─────────────────────────────────────────────────
        return { dispatch: dispatch, canvas: canvas, zone: zone, gesture: gesture, CFG: CFG };
      })();

      // ── Service Worker registration ────────────────────────────────
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function() {});
      }
    </script>
  </body>
</html>
